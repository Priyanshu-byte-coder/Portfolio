<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Priyanshu Doshi — AI &amp; ML Engineer</title>
  <meta name="description" content="Portfolio of Priyanshu Doshi — AI/ML Engineer, Full-Stack Developer, IEEE Published Researcher." />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- Noise Texture Overlay -->
  <div class="noise" aria-hidden="true"></div>

  <!-- Scroll Progress Bar -->
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

  <!-- Custom Cursor — crosshair + coordinates -->
  <div class="ch-line ch-line-h" id="chLineH" aria-hidden="true"></div>
  <div class="ch-line ch-line-v" id="chLineV" aria-hidden="true"></div>
  <div class="ch-box" id="chBox" aria-hidden="true">
    <span class="ch-dot"></span>
    <span class="ch-label">OPEN&nbsp;→</span>
    <span class="ch-coords" id="chCoords">0000 × 0000</span>
  </div>

  <div id="root"></div>

  <script>
    // Scroll progress
    window.addEventListener('scroll', () => {
      const h = document.documentElement.scrollHeight - window.innerHeight;
      const w = h > 0 ? (window.scrollY / h) * 100 : 0;
      const el = document.getElementById('scrollProgress');
      if (el) el.style.width = w + '%';
    }, { passive: true });

    // Custom cursor — crosshair + live coordinates (desktop only)
    if (window.matchMedia('(pointer: fine)').matches) {
      document.body.classList.add('has-crosshair');
      const lineH = document.getElementById('chLineH');
      const lineV = document.getElementById('chLineV');
      const box = document.getElementById('chBox');
      const coords = document.getElementById('chCoords');
      let mx = -100, my = -100, bx = -100, by = -100;
      document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });
      function animCursor() {
        bx += (mx - bx) * 0.25;
        by += (my - by) * 0.25;
        if (lineH) lineH.style.transform = 'translateY(' + my + 'px)';
        if (lineV) lineV.style.transform = 'translateX(' + mx + 'px)';
        if (box) box.style.transform = 'translate(' + bx + 'px, ' + by + 'px)';
        if (coords) coords.textContent =
          String(Math.max(0, Math.round(mx))).padStart(4, '0') + ' × ' +
          String(Math.max(0, Math.round(my))).padStart(4, '0');
        requestAnimationFrame(animCursor);
      }
      animCursor();

      const HOT = 'a, button, [role="button"], .fp-card, .sp-cell, .skill-tag, .social-btn, .cert-card, .pi-row, .pp-next, .gh-ach-card';
      const TEXT = 'input, textarea, select, [contenteditable]';
      document.addEventListener('mouseover', (e) => {
        if (!e.target.closest) return;
        document.body.classList.toggle('cursor-hot', !!e.target.closest(HOT));
        document.body.classList.toggle('cursor-text', !!e.target.closest(TEXT));
      });
      document.addEventListener('mouseleave', () => document.body.classList.add('cursor-gone'));
      document.addEventListener('mouseenter', () => document.body.classList.remove('cursor-gone'));
    }
  </script>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
