<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Priyanshu Doshi — AI &amp; ML Engineer</title>
  <meta name="description" content="Portfolio of Priyanshu Doshi — AI/ML Engineer, Full-Stack Developer, IEEE Published Researcher." />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- Noise Texture Overlay -->
  <div class="noise" aria-hidden="true"></div>

  <!-- Scroll Progress Bar -->
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

  <!-- Custom Cursor -->
  <div class="cursor-dot" id="cursorDot" aria-hidden="true"></div>
  <div class="cursor-ring" id="cursorRing" aria-hidden="true"></div>

  <div id="root"></div>

  <script>
    // Scroll progress
    window.addEventListener('scroll', () => {
      const h = document.documentElement.scrollHeight - window.innerHeight;
      const w = h > 0 ? (window.scrollY / h) * 100 : 0;
      const el = document.getElementById('scrollProgress');
      if (el) el.style.width = w + '%';
    }, { passive: true });

    // Custom cursor (desktop only)
    if (window.matchMedia('(pointer: fine)').matches) {
      const dot = document.getElementById('cursorDot');
      const ring = document.getElementById('cursorRing');
      let mx = -100, my = -100, rx = -100, ry = -100;
      document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });
      function animCursor() {
        rx += (mx - rx) * 0.15;
        ry += (my - ry) * 0.15;
        if (dot) { dot.style.left = mx + 'px'; dot.style.top = my + 'px'; }
        if (ring) { ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; }
        requestAnimationFrame(animCursor);
      }
      animCursor();
      document.addEventListener('mouseover', (e) => {
        if (e.target.closest && e.target.closest('a, button, .fp-card, .sp-cell, .skill-tag, .social-btn, .cert-card')) {
          if (ring) { ring.style.width = '64px'; ring.style.height = '64px'; ring.style.borderColor = 'rgba(196,93,62,0.5)'; }
          if (dot) dot.style.opacity = '0.5';
        }
      });
      document.addEventListener('mouseout', (e) => {
        if (e.target.closest && e.target.closest('a, button, .fp-card, .sp-cell, .skill-tag, .social-btn, .cert-card')) {
          if (ring) { ring.style.width = '40px'; ring.style.height = '40px'; ring.style.borderColor = 'rgba(196,93,62,0.3)'; }
          if (dot) dot.style.opacity = '1';
        }
      });
    }
  </script>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
